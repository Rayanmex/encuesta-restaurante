<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crear Pregunta</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #ff6b00; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn { background: #6c757d; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ Nueva Pregunta</h1>
        <form method="POST">
            {% csrf_token %}
            <label>Texto de la pregunta:</label>
            <input type="text" name="texto" required>
            
            <label>Tipo de respuesta:</label>
            <select name="tipo">
                <option value="estrella">⭐ Calificación por estrellas (1-5)</option>
                <option value="si_no">✅ Sí / No</option>
                <option value="texto">📝 Respuesta de texto</option>
            </select>
            
            <label>Orden (número más pequeño = aparece primero):</label>
            <input type="number" name="orden" value="0">
            
            <label>
                <input type="checkbox" name="activa" checked> ¿Activa?
            </label>
            
            <button type="submit">Guardar Pregunta</button>
            <a href="{% url 'dashboard' %}" class="btn">Cancelar</a>
        </form>
    </div>
</body>
</html>
