{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Encuesta de satisfacción - Chiwu Banderillas Coreanas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            
        }

        .logo h3 {
            font-size: 18px;
            color: #1e40af;
            font-weight: 600;
        }

        .logo p {
            font-size: 12px;
            color: #64748b;
        }

        .progress {
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #fbbf24;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .restaurant-icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .pregunta-texto {
            font-size: 22px;
            font-weight: 600;
            color: #1e3a8a;
            margin: 20px 0 30px;
            line-height: 1.3;
            min-height: 80px;
        }

        .estrellas {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .estrella {
            font-size: 48px;
            cursor: pointer;
            color: #ccc;
            transition: all 0.2s ease;
            padding: 5px;
        }

        .estrella.seleccionada {
            color: #fbbf24;
            transform: scale(1.1);
        }

        .estrella:hover {
            transform: scale(1.2);
        }

        button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: #fbbf24;
            color: #1e3a8a;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .gracias-card {
            text-align: center;
        }

        .gracias-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .gracias-card h2 {
            color: #1e40af;
            margin-bottom: 16px;
        }

        .gracias-card p {
            color: #666;
            margin-bottom: 24px;
            font-size: 16px;
        }

        .reiniciando {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }
            .pregunta-texto {
                font-size: 20px;
            }
            .estrella {
                font-size: 40px;
            }
            button {
                padding: 14px 24px;
                font-size: 16px;
            }
            .logo img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- El contenido se renderiza con JavaScript -->
    </div>

    <script>
        // Datos de las preguntas (se cargan desde Django)
        const preguntas = [
            {% for p in preguntas %}
            {
                id: {{ p.id }},
                texto: "{{ p.texto|escapejs }}",
                tipo: "{{ p.tipo }}",
                opciones: "{{ p.opciones|escapejs }}"
            }{% if not forloop.last %},{% endif %}
            {% endfor %}
        ];

        let currentIndex = 0;
        let respuestas = [];
        let timerReinicio = null;

        // Renderizar según el estado
        function render() {
            const app = document.getElementById('app');
            
            // Si ya terminó y está en modo gracias
            if (currentIndex === -1) {
                app.innerHTML = renderGracias();
                return;
            }
            
            // Si aún hay preguntas
            if (currentIndex < preguntas.length) {
                app.innerHTML = renderPregunta(currentIndex);
                attachEvents();
            }
        }

        function renderPregunta(index) {
            const pregunta = preguntas[index];
            const progreso = (index / preguntas.length) * 100;
            const esUltima = (index === preguntas.length - 1);
            
            if (pregunta.tipo === 'seleccion') {
                return renderPreguntaSeleccion(pregunta, index, esUltima);
            } else {
                return renderPreguntaEstrella(pregunta, index, esUltima);
            }
        }

        function renderPreguntaEstrella(pregunta, index, esUltima) {
            const progreso = (index / preguntas.length) * 100;
            return `
                <div class="card">
                    <div class="logo">
                        <img src="{% static 'logo.png' %}" alt="Chiwu">
                        <h3>Chiwu</h3>
                        <p>Banderillas Coreanas</p>
                    </div>
                    
                    <div class="progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progreso}%"></div>
                        </div>
                        <div class="progress-text">Pregunta ${index + 1} de ${preguntas.length}</div>
                    </div>
                    
                    <div class="pregunta-texto">${pregunta.texto}</div>
                    
                    <div class="estrellas" data-pregunta-id="${pregunta.id}">
                        ${[1,2,3,4,5].map(valor => `
                            <span class="estrella" data-valor="${valor}">☆</span>
                        `).join('')}
                    </div>
                    
                    <input type="hidden" id="valor-seleccionado" value="">
                    
                    <button id="btn-siguiente" disabled>
                        ${esUltima ? '✨ Finalizar encuesta ✨' : 'Siguiente →'}
                    </button>
                </div>
            `;
        }

        function renderPreguntaSeleccion(pregunta, index, esUltima) {
            const progreso = (index / preguntas.length) * 100;
            const opciones = pregunta.opciones ? pregunta.opciones.split('\n') : [];
            
            return `
                <div class="card">
                    <div class="logo">
                        <img src="{% static 'logo.png' %}" alt="Chiwu">
                        <h3>Chiwu</h3>
                        <p>Banderillas Coreanas</p>
                    </div>
                    
                    <div class="progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progreso}%"></div>
                        </div>
                        <div class="progress-text">Pregunta ${index + 1} de ${preguntas.length}</div>
                    </div>
                    
                    <div class="pregunta-texto">${pregunta.texto}</div>
                    
                    <div class="opciones" data-pregunta-id="${pregunta.id}">
                        ${opciones.map(op => `
                            <div class="opcion" style="margin: 10px 0; text-align: left;">
                                <label style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer;">
                                    <input type="radio" name="opcion" value="${op.trim()}" style="width: 20px; height: 20px;">
                                    <span style="font-size: 16px;">${op.trim()}</span>
                                </label>
                            </div>
                        `).join('')}
                    </div>
                    
                    <input type="hidden" id="valor-seleccionado" value="">
                    
                    <button id="btn-siguiente" disabled>
                        ${esUltima ? '✨ Finalizar encuesta ✨' : 'Siguiente →'}
                    </button>
                </div>
            `;
        }

        function renderGracias() {
            return `
                <div class="card gracias-card">
                    <div class="logo">
                        <img src="{% static 'logo.png' %}" alt="Chiwu">
                    </div>
                    <div class="gracias-icon">🎉</div>
                    <h2>¡Gracias por tu opinión!</h2>
                    <p>Tu feedback nos ayuda a mejorar cada día.<br>¡Te esperamos pronto!</p>
                    <div class="reiniciando">🔄 Reiniciando en <span id="contador">5</span> segundos...</div>
                </div>
            `;
        }

        function attachEvents() {
            const btnSiguiente = document.getElementById('btn-siguiente');
            const inputHidden = document.getElementById('valor-seleccionado');
            
            // Detectar si es tipo estrella o selección
            const estrellas = document.querySelectorAll('.estrella');
            const opciones = document.querySelectorAll('input[name="opcion"]');
            
            if (estrellas.length > 0) {
                // Tipo estrella
                estrellas.forEach(estrella => {
                    estrella.addEventListener('click', () => {
                        const valor = parseInt(estrella.dataset.valor);
                        inputHidden.value = valor;
                        
                        estrellas.forEach((e, idx) => {
                            if (idx < valor) {
                                e.innerHTML = '★';
                                e.classList.add('seleccionada');
                            } else {
                                e.innerHTML = '☆';
                                e.classList.remove('seleccionada');
                            }
                        });
                        btnSiguiente.disabled = false;
                    });
                });
            } else if (opciones.length > 0) {
                // Tipo selección
                opciones.forEach(opcion => {
                    opcion.addEventListener('change', () => {
                        if (opcion.checked) {
                            inputHidden.value = opcion.value;
                            btnSiguiente.disabled = false;
                        }
                    });
                });
            }
            
            btnSiguiente.onclick = () => {
                const valor = inputHidden.value;
                if (!valor) return;
                
                let preguntaId = null;
                const estrellasDiv = document.querySelector('.estrellas');
                const opcionesDiv = document.querySelector('.opciones');
                
                if (estrellasDiv) {
                    preguntaId = estrellasDiv.dataset.preguntaId;
                } else {
                    preguntaId = opcionesDiv.dataset.preguntaId;
                }
                
                respuestas.push({
                    pregunta_id: preguntaId,
                    valor: valor
                });
                
                if (currentIndex + 1 < preguntas.length) {
                    currentIndex++;
                    render();
                } else {
                    enviarRespuestasYFinalizar();
                }
            };

            btnSiguiente.onclick = () => {
                const valor = inputHidden.value;
                console.log("Valor seleccionado:", valor);
                console.log("CurrentIndex:", currentIndex);
                console.log("Total preguntas:", preguntas.length);
                
                if (!valor) return;
                
                let preguntaId = null;
                const estrellasDiv = document.querySelector('.estrellas');
                const opcionesDiv = document.querySelector('.opciones');
                
                if (estrellasDiv) {
                    preguntaId = estrellasDiv.dataset.preguntaId;
                } else {
                    preguntaId = opcionesDiv.dataset.preguntaId;
                }
                
                respuestas.push({
                    pregunta_id: preguntaId,
                    valor: valor
                });
                
                console.log("Respuestas:", respuestas);
                
                if (currentIndex + 1 < preguntas.length) {
                    console.log("Avanzando a siguiente pregunta");
                    currentIndex++;
                    render();
                } else {
                    console.log("ES LA ÚLTIMA PREGUNTA - Enviando...");
                    enviarRespuestasYFinalizar();
                }
            };
        }

        // Cambiar el nombre de la función en render()


        function guardarRespuesta(preguntaId, valor) {
            respuestas.push({
                pregunta_id: preguntaId,
                valor: valor
            });
        }

        function enviarRespuestasYFinalizar() {
            console.log("Enviando respuestas:", JSON.stringify({respuestas: respuestas}));
            
            fetch(window.location.href, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    respuestas: respuestas
                })
            })
            .then(response => {
                console.log("Respuesta del servidor - Status:", response.status);
                return response.json();
            })
            .then(data => {
                console.log("Datos recibidos:", data);
                if (data.success) {
                    currentIndex = -1;
                    render();
                    
                    let segundos = 5;
                    const contadorSpan = document.getElementById('contador');
                    if (timerReinicio) clearInterval(timerReinicio);
                    
                    timerReinicio = setInterval(() => {
                        segundos--;
                        if (contadorSpan) contadorSpan.innerText = segundos;
                        if (segundos <= 0) {
                            clearInterval(timerReinicio);
                            window.location.reload();
                        }
                    }, 1000);
                } else {
                    console.error("Error del servidor:", data.error);
                    alert('Error: ' + (data.error || 'No se pudo guardar'));
                }
            })
            .catch(error => {
                console.error('Error de conexión:', error);
                alert('Error de conexión al servidor');
            });
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Inicializar
        render();
    </script>
</body>
</html>
